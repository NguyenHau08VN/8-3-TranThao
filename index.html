<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="image/favicon.ico">
<title>Quốc tế phụ nữ</title>

<link rel="stylesheet" href="./renxi/default.css">

<script src="./renxi/jquery.min.js"></script>
<script src="./renxi/jscex.min.js"></script>
<script src="./renxi/jscex-parser.js"></script>
<script src="./renxi/jscex-jit.js"></script>
<script src="./renxi/jscex-builderbase.min.js"></script>
<script src="./renxi/jscex-async.min.js"></script>
<script src="./renxi/jscex-async-powerpack.min.js"></script>
<script src="./renxi/functions.js"></script>
<script src="./renxi/love.js"></script>

</head>

<body>

<audio autoplay loop>
<source src="music/nhac.mp3" type="audio/mp3">
</audio>

<div id="main">

<div id="wrap">

<div id="text" style="font-family:Calibri, sans-serif;">
<div id="code">

<font color="#ff4d6d">

<span class="say">Chào em </span><br>
<span class="say"></span><br>

<span class="say">Ngày 8/3 chúc một nửa thế giới luôn thành công trong cuộc sống!</span><br>

<span class="say">Chúc bạn luôn duyên dáng và xinh đẹp trong mắt một nửa thế giới còn lại.</span><br>

<span class="say">Kính chúc "một nửa" của nhân loại vui vẻ và hạnh phúc.</span><br>


<span class="say">-- Lớp trưởng --</span>

</font>

</div>
</div>

<canvas id="canvas" width="1100" height="680"></canvas>

</div>
</div>

<script>

(function(){

var canvas = $('#canvas');

var width = canvas.width();
var height = canvas.height();

canvas.attr("width", width);
canvas.attr("height", height);

var opts = {

seed:{
x: width / 2 - 20,
color: "rgb(190,26,37)",
scale: 2
},

branch:[
[535,680,570,250,500,200,30,100,[

[540,500,455,417,340,400,13,100,[

[450,435,434,430,394,395,2,40]

]],

[550,445,600,356,680,345,12,100,[

[578,400,648,409,661,426,3,80]

]],

[539,281,537,248,534,217,3,40],

[546,397,413,247,328,244,9,80,[

[427,286,383,253,371,205,2,40],

[498,345,435,315,395,330,4,60]

]],

[546,357,608,252,678,221,6,100,[

[590,293,646,277,648,271,2,80]

]]

]]

],

bloom:{
num:700,
width:1080,
height:650
},

footer:{
width:1200,
height:5,
speed:10
}

};

var tree = new Tree(canvas[0], width, height, opts);
var seed = tree.seed;
var foot = tree.footer;
var hold = 1;

canvas.click(function(e){

var offset = canvas.offset(), x, y;

x = e.pageX - offset.left;
y = e.pageY - offset.top;

if(seed.hover(x,y)){

hold = 0;
canvas.unbind("click");
canvas.unbind("mousemove");
canvas.removeClass('hand');

}

}).mousemove(function(e){

var offset = canvas.offset(), x, y;

x = e.pageX - offset.left;
y = e.pageY - offset.top;

canvas.toggleClass('hand', seed.hover(x,y));

});

var seedAnimate = eval(Jscex.compile("async", function(){

seed.draw();

while(hold){
$await(Jscex.Async.sleep(10));
}

while(seed.canScale()){
seed.scale(0.95);
$await(Jscex.Async.sleep(10));
}

while(seed.canMove()){
seed.move(0,2);
foot.draw();
$await(Jscex.Async.sleep(10));
}

}));

var growAnimate = eval(Jscex.compile("async", function(){

do{
tree.grow();
$await(Jscex.Async.sleep(10));
}
while(tree.canGrow());

}));

var flowAnimate = eval(Jscex.compile("async", function(){

do{
tree.flower(2);
$await(Jscex.Async.sleep(10));
}
while(tree.canFlower());

}));

var moveAnimate = eval(Jscex.compile("async", function(){

tree.snapshot("p1",240,0,610,680);

while(tree.move("p1",500,0)){
foot.draw();
$await(Jscex.Async.sleep(10));
}

foot.draw();

tree.snapshot("p2",500,0,610,680);

canvas.parent().css("background","url("+tree.toDataURL('image/png')+")");
canvas.css("background","#ffe");

$await(Jscex.Async.sleep(300));

canvas.css("background","none");

}));

var jumpAnimate = eval(Jscex.compile("async", function(){

while(true){

tree.ctx.clearRect(0,0,width,height);
tree.jump();
foot.draw();

$await(Jscex.Async.sleep(25));

}

}));

var textAnimate = eval(Jscex.compile("async", function(){

$("#code").show().typewriter();

}));

var runAsync = eval(Jscex.compile("async", function(){

$await(seedAnimate());
$await(growAnimate());
$await(flowAnimate());
$await(moveAnimate());

textAnimate().start();

$await(jumpAnimate());

}));

runAsync().start();

})();

</script>

</body>
</html>
